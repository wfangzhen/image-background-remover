<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片背景移除工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 700px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }

    .upload-area {
      border: 3px dashed #667eea;
      border-radius: 16px;
      padding: 60px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #f8f9ff;
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: #764ba2;
      background: #f0f2ff;
    }

    .upload-area p {
      color: #666;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .upload-area .hint {
      font-size: 14px;
      color: #999;
    }

    .upload-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    #fileInput {
      display: none;
    }

    .preview-section {
      display: none;
      margin-top: 30px;
    }

    .preview-section.active {
      display: block;
    }

    .preview-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .preview-box {
      text-align: center;
    }

    .preview-box h3 {
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      background: repeating-conic-gradient(#ccc 0% 25%, #fff 0% 50%) 50% / 20px 20px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f2ff;
      color: #667eea;
    }

    .btn-secondary:hover {
      background: #e8ebff;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f0f2ff;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading p {
      color: #666;
      font-size: 16px;
    }

    .error {
      background: #fee;
      border: 1px solid #fcc;
      color: #c33;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      display: none;
      text-align: center;
    }

    .error.active {
      display: block;
    }

    .credits {
      text-align: center;
      margin-top: 20px;
      color: #999;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ 图片背景移除工具</h1>

    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📤</div>
      <p>拖拽图片到这里，或点击选择</p>
      <span class="hint">支持 JPG、PNG、WebP，最大 10MB</span>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在移除背景...</p>
    </div>

    <div class="preview-section" id="previewSection">
      <div class="preview-container">
        <div class="preview-box">
          <h3>原图</h3>
          <img id="originalPreview" alt="原图">
        </div>
        <div class="preview-box">
          <h3>结果</h3>
          <img id="resultPreview" alt="处理后">
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="downloadBtn">下载图片</button>
        <button class="btn btn-secondary" id="resetBtn">处理下一张</button>
      </div>
    </div>

    <div class="error" id="errorMsg"></div>

    <div class="credits">
      Powered by Remove.bg + Cloudflare Workers
    </div>
  </div>

  <script>
    // 配置 - 部署后替换为你的 Worker URL
    const API_URL = 'https://YOUR-WORKER.workers.dev/removebg';

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const loading = document.getElementById('loading');
    const previewSection = document.getElementById('previewSection');
    const originalPreview = document.getElementById('originalPreview');
    const resultPreview = document.getElementById('resultPreview');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const errorMsg = document.getElementById('errorMsg');

    let resultDataUrl = null;

    // 上传区域事件
    uploadArea.addEventListener('click', () => fileInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });

    resetBtn.addEventListener('click', reset);
    downloadBtn.addEventListener('click', downloadResult);

    function handleFile(file) {
      // 校验
      const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
      if (!validTypes.includes(file.type)) {
        showError('仅支持 JPG、PNG、WebP 格式');
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        showError('文件过大，最大支持 10MB');
        return;
      }

      hideError();
      uploadArea.style.display = 'none';

      // 预览原图
      const reader = new FileReader();
      reader.onload = (e) => {
        originalPreview.src = e.target.result;
        processImage(file);
      };
      reader.readAsDataURL(file);
    }

    async function processImage(file) {
      loading.classList.add('active');
      previewSection.classList.remove('active');

      try {
        // 转 base64
        const base64 = await fileToBase64(file);
        const base64Data = base64.split(',')[1];

        // 调用 API
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image_base64: base64Data })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.error || '处理失败');
        }

        // 显示结果
        resultDataUrl = `data:image/png;base64,${data.image_base64}`;
        resultPreview.src = resultDataUrl;
        
        loading.classList.remove('active');
        previewSection.classList.add('active');

      } catch (error) {
        loading.classList.remove('active');
        showError(error.message || '处理失败，请重试');
        uploadArea.style.display = 'block';
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function downloadResult() {
      if (!resultDataUrl) return;
      
      const link = document.createElement('a');
      link.href = resultDataUrl;
      link.download = 'background-removed.png';
      link.click();
    }

    function reset() {
      uploadArea.style.display = 'block';
      previewSection.classList.remove('active');
      loading.classList.remove('active');
      hideError();
      fileInput.value = '';
      resultDataUrl = null;
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('active');
    }

    function hideError() {
      errorMsg.classList.remove('active');
    }
  </script>
</body>
</html>
